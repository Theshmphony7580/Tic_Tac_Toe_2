version: "3.9"

services:
  # --- Data Layer ---
  postgres:
    image: pgvector/pgvector:16
    environment:
      POSTGRES_DB: talentintel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed_taxonomy.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf

  # --- Application Services ---
  gateway:
    build: ../backend/gateway-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:changeme@postgres:5432/talentintel}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - PARSER_SERVICE_URL=${PARSER_SERVICE_URL:-http://parser:8001}
      - NORMALIZATION_SERVICE_URL=${NORMALIZATION_SERVICE_URL:-http://normalizer:8002}
      - MATCHING_SERVICE_URL=${MATCHING_SERVICE_URL:-http://matcher:8003}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  parser:
    build: ../backend/parser-service
    ports:
      - "8001:8001"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}

  normalizer:
    build: ../backend/normalization-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:changeme@postgres:5432/talentintel}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  matcher:
    build: ../backend/matching-service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:changeme@postgres:5432/talentintel}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    depends_on:
      postgres:
        condition: service_healthy

  orchestrator:
    build: ../backend/orchestrator-service
    ports:
      - "8004:8004"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:changeme@postgres:5432/talentintel}
      - PARSER_SERVICE_URL=${PARSER_SERVICE_URL:-http://parser:8001}
      - NORMALIZATION_SERVICE_URL=${NORMALIZATION_SERVICE_URL:-http://normalizer:8002}
      - MATCHING_SERVICE_URL=${MATCHING_SERVICE_URL:-http://matcher:8003}
    depends_on:
      - redis
      - parser
      - normalizer
      - matcher

  celery-worker:
    build: ../backend/orchestrator-service
    command: celery -A app.workers worker --loglevel=info --concurrency=4
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:changeme@postgres:5432/talentintel}
      - PARSER_SERVICE_URL=${PARSER_SERVICE_URL:-http://parser:8001}
      - NORMALIZATION_SERVICE_URL=${NORMALIZATION_SERVICE_URL:-http://normalizer:8002}
      - MATCHING_SERVICE_URL=${MATCHING_SERVICE_URL:-http://matcher:8003}
    depends_on:
      - redis
      - orchestrator

volumes:
  pgdata:
